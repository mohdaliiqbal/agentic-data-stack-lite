# LibreChat — chat UI (always-on baseline)
# Depends on: mongodb (below), clickhouse-mcp (clickhouse-mcp-compose.yml)

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: always
    ports:
      - "${LIBRECHAT_PORT:-3080}:${LIBRECHAT_PORT:-3080}"
    depends_on:
      mongodb:
        condition: service_started
      clickhouse-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - HOST=0.0.0.0
      - PORT=${LIBRECHAT_PORT:-3080}
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # Langfuse tracing — only active when Langfuse profile is enabled
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - librechat_images:/app/client/public/images
      - librechat_uploads:/app/uploads

  librechat-user-init:
    image: docker:27-cli
    restart: "no"
    depends_on:
      librechat:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_INIT_USER_EMAIL}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_USER_PASSWORD}
      - LANGFUSE_INIT_USER_NAME=${LANGFUSE_INIT_USER_NAME}
      - LIBRECHAT_PORT=${LIBRECHAT_PORT:-3080}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-workos-2}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - type: bind
        source: ./scripts/init-librechat-user.sh
        target: /init-user.sh
        read_only: true
    working_dir: /
    entrypoint: ["/bin/sh", "/init-user.sh"]

  mongodb:
    image: mongo:8.0.17
    restart: always
    volumes:
      - librechat_mongodb_data:/data/db
    command: mongod --noauth
    ports:
      - "127.0.0.1:27017:27017"

volumes:
  librechat_mongodb_data:
  librechat_images:
  librechat_uploads:
